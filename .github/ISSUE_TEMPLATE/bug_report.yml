name: Bug report
description: Report a reproducible problem without sharing private records
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thank you for helping with the Linux alpha.

        Do not attach exports, databases, recovery secrets, extension storage, keyring material, or screenshots containing private records. Use the Security tab for vulnerabilities.
  - type: input
    id: version
    attributes:
      label: MindCanary version
      placeholder: 0.1.2
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Linux distribution and desktop environment
      placeholder: Pop!_OS 24.04, GNOME, X11
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Affected area
      options:
        - Desktop app
        - Local daemon
        - Linux package or service
        - Browser extension or native host
        - Export, backup, restore, or removal
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps without private data
    validations:
      required: true
  - type: textarea
    id: diagnostics
    attributes:
      label: Reviewed support information or non-sensitive error text
      description: The Data page can preview support information. Review it before pasting.
      render: text
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I removed personal values and did not attach private MindCanary records.
          required: true
